name: Run Pytest

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
    - name: Install uv
      uses: astral-sh/setup-uv@f986551839d50c774400a44276711802967f897f # v5.2.2
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      # Cursor dặn rất đúng: luôn dùng --locked để đồng bộ máy local và CI
      run: uv sync --locked --all-extras --dev

    - name: Run pytest
      run: uv run --with pytest pytest
