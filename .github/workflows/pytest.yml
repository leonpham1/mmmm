name: Run Pytest

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.14

    - name: Install dependencies
      # always use --locked to sync local and CI
      run: uv sync --locked --all-extras --dev

    - name: Run Ruff
      run: uv run ruff check .

    - name: Run pytest
      env:
        # Required at import time by app.core.config.Settings (before conftest patches).
        ZALO_OA_SECRET_KEY: test_secret_key
      run: uv run pytest
